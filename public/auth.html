<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Airconecall 로그인</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/favicon.svg" color="#2563eb" />
    <style>
      :root {
        --blue: #2563eb;
        --ink: #101828;
        --muted: #5b6675;
        --line: #d8e0ea;
        --soft: #f6f8fb;
        --green: #059669;
        --red: #b42318;
      }
      * { box-sizing: border-box; font-family: Inter, system-ui, sans-serif; }
      body { margin: 0; min-height: 100svh; color: var(--ink); background: var(--soft); }
      .wrap { width: min(1040px, calc(100vw - 32px)); margin: 0 auto; padding: 34px 0; }
      .top { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 22px; }
      .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; text-decoration: none; color: var(--ink); }
      .brand img { width: 32px; height: 32px; }
      .top-nav { display: flex; align-items: center; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
      .home, .top-button {
        min-height: 38px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 8px 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        color: var(--ink);
        text-decoration: none;
        font-size: 14px;
        font-weight: 800;
      }
      .top-button { cursor: pointer; }
      .home.primary { color: #fff; border-color: var(--blue); background: var(--blue); }
      .layout { display: grid; grid-template-columns: 0.9fr 1.1fr; gap: 22px; align-items: start; }
      .intro, .form-panel { border: 1px solid var(--line); border-radius: 18px; background: #fff; }
      .intro { padding: 26px; }
      .intro h1 { margin: 0; font-size: clamp(34px, 5vw, 56px); line-height: 1.02; letter-spacing: 0; }
      .intro p { margin: 14px 0 0; color: var(--muted); line-height: 1.65; }
      .rule { margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--line); color: var(--muted); font-size: 14px; line-height: 1.55; }
      .form-panel { padding: 22px; box-shadow: 0 22px 52px -38px rgba(16, 24, 40, 0.5); }
      .seg { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 14px; }
      .roles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 18px; }
      button, input, select {
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 11px;
        background: #fff;
        color: var(--ink);
        font-size: 14px;
      }
      button { cursor: pointer; font-weight: 800; }
      button.active { border-color: var(--blue); background: var(--blue); color: #fff; }
      form { display: grid; gap: 11px; }
      label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; font-weight: 700; }
      input, select { width: 100%; padding: 0 12px; }
      .row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .hidden { display: none; }
      .submit { color: #fff; background: var(--blue); border-color: var(--blue); }
      .muted { color: var(--muted); font-size: 13px; line-height: 1.55; }
      .msg { min-height: 22px; margin-top: 12px; font-size: 14px; line-height: 1.5; }
      .msg.ok { color: var(--green); }
      .msg.err { color: var(--red); }
      .session-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
      .session-actions a { text-decoration: none; }
      .checkrow { display: flex; align-items: center; gap: 8px; color: var(--ink); font-weight: 600; }
      .checkrow input { width: 18px; min-height: 18px; }
      @media (max-width: 820px) {
        .layout { grid-template-columns: 1fr; }
        .row, .roles { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <header class="top">
        <a class="brand" href="/index.html">
          <img src="/branding/icon-mark.png" alt="" />
          <span>Airconecall</span>
        </a>
        <nav class="top-nav" aria-label="상단 메뉴">
          <a class="home hidden" id="topHome" href="/index.html">홈화면</a>
          <a class="home primary hidden" id="topDashboard" href="/dashboard.html">대시보드 화면 보기</a>
          <button class="top-button hidden" id="topLogout" type="button" data-logout>로그아웃</button>
        </nav>
      </header>
      <section class="layout">
        <aside class="intro">
          <h1 id="introTitle">필요한 일을 이어서 시작하세요</h1>
          <p id="introBody">
            Airconecall은 고객 문의, 기사 작업, 판매자 공급, 관리자 운영을 하나의 흐름으로 연결합니다.
            로그인하면 내 계정 역할에 맞는 화면에서 오늘 해야 할 일을 바로 확인할 수 있습니다.
          </p>
          <div class="rule" id="introRule">
            고객은 문의와 혜택을, 기사는 배정 작업과 정산을, 판매자는 공급 신청 상태를 확인합니다. 관리자는 내부에서 권한이 부여된 계정만 접근합니다.
          </div>
        </aside>

        <section class="form-panel">
          <div class="seg" aria-label="mode">
            <button type="button" id="modeLogin">로그인</button>
            <button type="button" id="modeSignup">회원가입</button>
          </div>
          <div class="roles hidden" id="roleSelector" aria-label="role">
            <button type="button" data-role="customer">일반회원</button>
            <button type="button" data-role="technician">기사</button>
            <button type="button" data-role="seller">판매자</button>
          </div>

          <form id="loginForm">
            <label>
              전화번호
              <input name="phone" type="tel" inputmode="numeric" autocomplete="tel" placeholder="01012345678" required />
            </label>
            <label>
              비밀번호
              <input name="password" type="password" autocomplete="current-password" minlength="5" required />
            </label>
            <button class="submit" type="submit">로그인</button>
          </form>

          <form id="signupForm" class="hidden">
            <div id="customerFields">
              <div class="row">
                <label>
                  이름
                  <input name="customerName" autocomplete="name" />
                </label>
                <label>
                  전화번호
                  <input name="customerPhone" type="tel" inputmode="numeric" autocomplete="tel" />
                </label>
              </div>
              <label>
                비밀번호
                <input name="customerPassword" type="password" autocomplete="new-password" minlength="5" />
              </label>
              <label class="checkrow">
                <input name="marketingConsent" type="checkbox" />
                혜택 알림 수신 동의
              </label>
            </div>

            <div id="technicianFields" class="hidden">
              <div class="row">
                <label>
                  이름
                  <input name="technicianName" />
                </label>
                <label>
                  전화번호
                  <input name="technicianPhone" type="tel" inputmode="numeric" />
                </label>
              </div>
              <label>
                비밀번호
                <input name="technicianPassword" type="password" autocomplete="new-password" minlength="5" />
              </label>
              <label>
                활동 지역
                <input name="baseRegion" placeholder="예: 경기 고양시" />
              </label>
              <div class="row">
                <label>
                  은행명
                  <input name="bankName" />
                </label>
                <label>
                  계좌번호
                  <input name="bankAccount" />
                </label>
              </div>
            </div>

            <div id="sellerFields" class="hidden">
              <div class="row">
                <label>
                  담당자명
                  <input name="ownerName" />
                </label>
                <label>
                  전화번호
                  <input name="sellerPhone" type="tel" inputmode="numeric" />
                </label>
              </div>
              <label>
                비밀번호
                <input name="sellerPassword" type="password" autocomplete="new-password" minlength="5" />
              </label>
              <label>
                상호명
                <input name="companyName" />
              </label>
              <div class="row">
                <label>
                  사업자번호
                  <input name="businessNumber" />
                </label>
                <label>
                  취급 품목
                  <input name="productCategory" placeholder="배관, 자재, 부품 등" />
                </label>
              </div>
            </div>

            <button class="submit" type="submit">회원가입 신청</button>
          </form>
          <div id="msg" class="msg" aria-live="polite"></div>
          <div id="sessionActions" class="session-actions hidden"></div>
        </section>
      </section>
    </main>

    <script src="/session.js"></script>
    <script>
      const state = {
        mode: location.hash === '#signup' ? 'signup' : 'login',
        role: 'customer',
      };

      const $ = (s) => document.querySelector(s);
      const introTitle = $('#introTitle');
      const introBody = $('#introBody');
      const introRule = $('#introRule');
      const msg = $('#msg');
      const loginForm = $('#loginForm');
      const signupForm = $('#signupForm');
      const modeLogin = $('#modeLogin');
      const modeSignup = $('#modeSignup');
      const roleSelector = $('#roleSelector');
      const roleButtons = [...document.querySelectorAll('[data-role]')];
      const sessionActions = $('#sessionActions');
      const topHome = $('#topHome');
      const topDashboard = $('#topDashboard');
      const topLogout = $('#topLogout');

      function api(path, options = {}) {
        return fetch(path, {
          ...options,
          headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        }).then(async (res) => {
          const json = await res.json().catch(() => ({}));
          if (!json.ok) {
            const detail = json.error?.message || json.message || '요청을 처리하지 못했습니다.';
            const text = Array.isArray(detail) ? detail.join(', ') : detail;
            if (/SUPABASE|Supabase 환경변수/i.test(text)) {
              throw new Error('서버 DB 연결 설정이 필요합니다. 로컬은 .env.local에 Supabase 값을 넣고 서버를 재시작해 주세요.');
            }
            throw new Error(text);
          }
          return json.data;
        });
      }

      function digits(v) {
        return String(v || '').replace(/\D/g, '');
      }

      function setMessage(text, ok) {
        msg.textContent = text;
        msg.className = `msg ${ok ? 'ok' : 'err'}`;
      }

      function renderSessionNav() {
        const session = window.AirconecallSession?.read();
        topHome.classList.toggle('hidden', !session);
        topDashboard.classList.toggle('hidden', !session);
        topLogout.classList.toggle('hidden', !session);
        if (session) topDashboard.href = window.AirconecallSession.dashboardHref(session);
      }

      function renderSessionActions() {
        const session = window.AirconecallSession?.read();
        if (!session) {
          sessionActions.classList.add('hidden');
          sessionActions.innerHTML = '';
          return;
        }
        sessionActions.innerHTML = `<a class="home primary" href="${window.AirconecallSession.dashboardHref(session)}">대시보드 화면 보기</a>`;
        sessionActions.classList.remove('hidden');
      }

      const introCopy = {
        login: {
          title: '필요한 일을 이어서 시작하세요',
          body: 'Airconecall은 고객 문의, 기사 작업, 판매자 공급, 관리자 운영을 하나의 흐름으로 연결합니다. 로그인하면 내 계정 역할에 맞는 화면에서 오늘 해야 할 일을 바로 확인할 수 있습니다.',
          rule: '고객은 문의와 혜택을, 기사는 배정 작업과 정산을, 판매자는 공급 신청 상태를 확인합니다. 관리자는 내부에서 권한이 부여된 계정만 접근합니다.',
        },
        customer: {
          title: '일반회원으로 가입하면',
          body: '서비스 문의를 남기고, 내 연락처와 회원 정보를 관리하며, 가입 쿠폰과 리워드 혜택을 확인할 수 있습니다. 접수된 문의가 주문으로 이어지는 과정도 내 대시보드에서 볼 수 있습니다.',
          rule: '급한 고장 문의부터 설치·청소 예약까지 고객 화면에서 시작하고, 혜택과 문의 내역을 한 곳에 모아 관리합니다.',
        },
        technician: {
          title: '기사로 신청하면',
          body: '활동 지역과 정산 계좌를 등록하고 운영 검토를 거친 뒤, 승인된 기사 포털에서 배정 주문, 작업 상태, 자재 항목, 정산 내역을 확인할 수 있습니다.',
          rule: '승인 후에는 출발, 작업 시작, 완료 같은 현장 상태를 직접 변경하고 본인에게 배정된 작업만 안전하게 관리합니다.',
        },
        seller: {
          title: '판매자로 신청하면',
          body: '상호명, 담당자, 사업자번호, 취급 품목을 등록해 부품·자재·상품 공급 파트너로 신청할 수 있습니다. 신청 후 운영 검토 상태를 판매자 대시보드에서 확인합니다.',
          rule: '공급 가능한 품목과 검토 상태를 명확히 남겨 관리자 운영 화면과 연결되는 판매자 흐름을 만듭니다.',
        },
      };

      function renderIntroCopy() {
        const copy = state.mode === 'login' ? introCopy.login : introCopy[state.role];
        introTitle.textContent = copy.title;
        introBody.textContent = copy.body;
        introRule.textContent = copy.rule;
      }

      function render() {
        modeLogin.classList.toggle('active', state.mode === 'login');
        modeSignup.classList.toggle('active', state.mode === 'signup');
        loginForm.classList.toggle('hidden', state.mode !== 'login');
        signupForm.classList.toggle('hidden', state.mode !== 'signup');
        roleSelector.classList.toggle('hidden', state.mode !== 'signup');
        roleButtons.forEach((b) => b.classList.toggle('active', b.dataset.role === state.role));
        $('#customerFields').classList.toggle('hidden', state.role !== 'customer');
        $('#technicianFields').classList.toggle('hidden', state.role !== 'technician');
        $('#sellerFields').classList.toggle('hidden', state.role !== 'seller');
        msg.textContent = '';
        msg.className = 'msg';
        renderIntroCopy();
        renderSessionNav();
        renderSessionActions();
      }

      modeLogin.onclick = () => {
        state.mode = 'login';
        location.hash = 'login';
        render();
      };
      modeSignup.onclick = () => {
        state.mode = 'signup';
        location.hash = 'signup';
        render();
      };
      roleButtons.forEach((b) => {
        b.onclick = () => {
          state.role = b.dataset.role;
          render();
        };
      });

      loginForm.onsubmit = async (event) => {
        event.preventDefault();
        const loginData = new FormData(loginForm);
        const phone = digits(loginData.get('phone'));
        const password = String(loginData.get('password') || '');
        try {
          const data = await api('/api/auth/session', { method: 'POST', body: JSON.stringify({ phone, password }) });
          const session = window.AirconecallSession?.write({
            id: data.id || data.memberId || data.technicianId || data.sellerId,
            role: data.role,
            name: data.name || data.companyName,
            phone: data.phone || phone,
            status: data.status || 'active',
          });
          setMessage(`${data.name || data.companyName || '계정'} 로그인 확인 · ${data.role} 대시보드로 이동합니다.`, true);
          window.location.href = window.AirconecallSession.dashboardHref(session);
        } catch (e) {
          setMessage(e.message, false);
        }
      };

      signupForm.onsubmit = async (event) => {
        event.preventDefault();
        const fd = new FormData(signupForm);
        try {
          if (state.role === 'customer') {
            const data = await api('/api/members/register', {
              method: 'POST',
              body: JSON.stringify({
                name: String(fd.get('customerName') || '').trim(),
                phone: digits(fd.get('customerPhone')),
                password: String(fd.get('customerPassword') || ''),
                marketingConsent: fd.get('marketingConsent') === 'on',
              }),
            });
            setMessage(`고객 가입 완료 · member ${data.member?.id || ''}`, true);
          }
          if (state.role === 'technician') {
            const baseRegion = String(fd.get('baseRegion') || '').trim();
            const data = await api('/api/technician/register', {
              method: 'POST',
              body: JSON.stringify({
                name: String(fd.get('technicianName') || '').trim(),
                phone: digits(fd.get('technicianPhone')),
                password: String(fd.get('technicianPassword') || ''),
                baseRegion,
                regions: baseRegion ? [baseRegion] : [],
                bankName: String(fd.get('bankName') || '').trim() || undefined,
                bankAccount: String(fd.get('bankAccount') || '').trim() || undefined,
                capabilities: [{
                  serviceType: 'install',
                  airconType: 'wall',
                }],
              }),
            });
            setMessage(`기사 신청 접수 · 상태 ${data.status}`, true);
          }
          if (state.role === 'seller') {
            const data = await api('/api/sellers/register', {
              method: 'POST',
              body: JSON.stringify({
                ownerName: String(fd.get('ownerName') || '').trim(),
                phone: digits(fd.get('sellerPhone')),
                password: String(fd.get('sellerPassword') || ''),
                companyName: String(fd.get('companyName') || '').trim(),
                businessNumber: String(fd.get('businessNumber') || '').trim() || undefined,
                productCategory: String(fd.get('productCategory') || '').trim() || undefined,
              }),
            });
            setMessage(`판매자 신청 접수 · 상태 ${data.status}`, true);
          }
        } catch (e) {
          setMessage(e.message, false);
        }
      };

      window.addEventListener('hashchange', () => {
        state.mode = location.hash === '#signup' ? 'signup' : 'login';
        render();
      });
      window.AirconecallSession?.bindLogout();
      render();
    </script>
  </body>
</html>
