<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 다른 포트(예: Vite)에서 이 HTML 을 열 때 API 베이스를 지정: http://127.0.0.1:4000 -->
    <script>
      window.__ADMIN_API_BASE__ = window.__ADMIN_API_BASE__ || '';
    </script>
    <title>리빙브릿지의 ACnow 관리</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/favicon.svg" color="#2563eb" />
    <link rel="stylesheet" href="/admin/styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <a class="admin-brand" href="/index.html" aria-label="리빙브릿지 홈">
          <img src="/branding/living-bridge.png" alt="" />
          <span>리빙브릿지의 ACnow 관리</span>
        </a>
        <h1>관리자</h1>
        <nav id="tabs"></nav>
      </aside>
      <main class="content">
        <header class="top">
          <div>
            <h2 id="title">전체 회원관리</h2>
            <p class="muted">
              Supabase 운영 데이터 기준 · 임시 role-only 모드(보안 인증 아님). API 는 이 페이지와 같은 호스트(<code>Nest 기본 :4000</code>)를 씁니다.
            </p>
          </div>
          <div class="top-actions">
            <a class="top-link" href="/index.html">홈화면</a>
            <button class="top-link" id="logoutBtn" type="button">로그아웃</button>
            <label class="muted" style="font-size:12px;">role</label>
            <select id="roleSelect">
              <option value="super_admin">super_admin</option>
              <option value="ops_admin">ops_admin</option>
              <option value="dispatch_admin">dispatch_admin</option>
              <option value="finance_admin">finance_admin</option>
            </select>
            <span class="badge" id="sessionRole">temporary</span>
          </div>
        </header>
        <section class="panel">
          <div id="toolbar"></div>
          <div id="list"></div>
        </section>
        <div id="modalRoot" class="modal-root hidden" aria-hidden="true">
          <div class="modal-backdrop" id="modalBackdrop"></div>
          <div class="modal-dialog" role="dialog" aria-modal="true">
            <h3 id="modalTitle" class="modal-title"></h3>
            <form id="modalForm" class="modal-form"></form>
            <div class="modal-actions">
              <button type="button" class="ghost" id="modalCancel">취소</button>
              <button type="submit" form="modalForm" class="primary" id="modalSubmit">저장</button>
            </div>
          </div>
        </div>
        <section class="panel">
          <h3>상세/액션</h3>
          <pre id="detail"></pre>
          <div id="actions"></div>
        </section>
      </main>
    </div>
    <script src="/session.js"></script>
    <script src="/admin/app.js"></script>
  </body>
</html>
